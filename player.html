<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HTML5 视频播放器</title>
    <style>
        html, body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            height: 100%;
            text-align: center;
            background: #f5f5f5;
            -webkit-app-region: no-drag;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* 标题栏区域 - 可拖动窗口 */
        .title-bar {
            height: 28px;
            background-color: #e8e8e8;
            -webkit-app-region: drag;
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            -webkit-app-region: no-drag;
        }

        video {
            width: 85%;
            max-width: 900px;
            margin-top: 15px;
            background: #000;
            border-radius: 8px;
        }
        input, button, select {
            margin: 8px;
            padding: 8px 14px;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            background: #007aff;
            color: #fff;
            cursor: pointer;
        }
        button:hover, select:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="title-bar">
    <img src="cat-fish-64.png" style="width: 18px; height: 18px; margin-right: 6px;" alt="图标">
    <span>视频播放器</span>
</div>

<div class="content-area">
    <!-- 选择视频 -->
    <input type="file" id="fileInput" accept="video/*">

    <!-- 播放器 -->
    <br>
    <div id="videoContainer" style="width:85%; max-width:900px; margin:15px auto; position:relative;">
        <video id="video" controls>
            <!--<track id="subtitleTrack" kind="subtitles" srclang="zh" label="中文字幕" default>-->
        </video>
        <button id="fullscreenBtn" style="position:absolute; top:10px; right:10px;">全屏</button>
    </div>


    <!-- 倍速 & 重置进度 -->
    <br>
    <span>倍速：</span>
    <select id="speedSelect">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1">1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5" selected>1.5x</option>
        <option value="2">2x</option>
    </select>
    <button id="resetBtn">重置进度</button>
</div>

<script>
    const video = document.getElementById("video");
    const fileInput = document.getElementById("fileInput");
    const speedSelect = document.getElementById("speedSelect");
    const resetBtn = document.getElementById("resetBtn");
    let currentVideoKey = null;
    let currentFile = null;
    let currentVideoUrl = null;

    // 保存当前视频信息到 localStorage
    function saveCurrentVideoInfo(file) {
        if (!file) return;

        const videoInfo = {
            name: file.name,
            size: file.size,
            lastModified: file.lastModified
        };
        localStorage.setItem('current_video_info', JSON.stringify(videoInfo));
    }

    // 从 localStorage 恢复视频信息
    function loadVideoInfo() {
        const savedInfo = localStorage.getItem('current_video_info');
        if (savedInfo) {
            try {
                return JSON.parse(savedInfo);
            } catch (e) {
                console.error('Failed to parse video info:', e);
                return null;
            }
        }
        return null;
    }

    function onVideoLoaded() {
        const savedTime = localStorage.getItem(currentVideoKey);
        if(savedTime) video.currentTime = Number(savedTime);

        const savedRate = localStorage.getItem("video_playback_rate");
        if(savedRate){
            speedSelect.value = savedRate;
            video.playbackRate = Number(savedRate);
        }else{
            speedSelect.value = "1.5";
            video.playbackRate = 1.5;
        }
    }

    // 选择视频
    fileInput.addEventListener("change", (e)=>{
        const file = e.target.files[0];
        if(!file) return;

        currentFile = file;

        // 生成唯一 Key
        currentVideoKey = "video_progress_" + file.name + "_" + file.size + "_" + file.lastModified;

        // 释放之前的 URL 对象
        if (currentVideoUrl) {
            URL.revokeObjectURL(currentVideoUrl);
        }

        currentVideoUrl = URL.createObjectURL(file);
        video.src = currentVideoUrl;

        // 保存当前视频信息
        saveCurrentVideoInfo(file);
    });

    video.addEventListener("loadedmetadata", onVideoLoaded);

    // 页面加载时尝试恢复上一次的视频
    window.addEventListener('load', () => {
        const videoInfo = loadVideoInfo();
        if (videoInfo) {
            // 静默记录上次播放的视频，不弹出提示
            console.log('上次播放的视频:', videoInfo.name);
        }
    });

    // 保存播放进度
    video.addEventListener("timeupdate", ()=>{
        if (!currentVideoKey) return;
        localStorage.setItem(currentVideoKey, video.currentTime.toString());
    });

    // 播放结束清除进度
    video.addEventListener("ended", ()=>{
        if (!currentVideoKey) return;
        localStorage.removeItem(currentVideoKey);
        // 清除当前视频信息
        localStorage.removeItem('current_video_info');
    });

    // 倍速控制  用户修改倍速时保存
    speedSelect.addEventListener("change", ()=>{
        const rate = Number(speedSelect.value);
        video.playbackRate = rate;
        localStorage.setItem("video_playback_rate", rate);
    });

    // 重置进度
    resetBtn.addEventListener("click", ()=>{
        if (!currentVideoKey) return;
        localStorage.removeItem(currentVideoKey);
        video.currentTime = 0;
        // 不自动播放 video.play();
    });

    const videoContainer = document.getElementById("videoContainer");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    let isFull = false;

    fullscreenBtn.addEventListener("click", ()=>{
        if(!isFull){
            // 放大视频到容器最大
            video.style.width = "100%";
            video.style.height = "100%";
            videoContainer.style.width = "100%";
            videoContainer.style.height = "100%";
            videoContainer.style.position = "fixed";
            videoContainer.style.top = "0";
            videoContainer.style.left = "0";
            videoContainer.style.zIndex = "1000";
            fullscreenBtn.textContent = "退出全屏";
            isFull = true;
        } else {
            // 恢复原始大小
            video.style.width = "85%";
            video.style.height = "auto";
            videoContainer.style.width = "85%";
            videoContainer.style.height = "auto";
            videoContainer.style.position = "relative";
            videoContainer.style.top = "auto";
            videoContainer.style.left = "auto";
            videoContainer.style.zIndex = "auto";
            fullscreenBtn.textContent = "全屏";
            isFull = false;
        }
    });
</script>

</body>
</html>
