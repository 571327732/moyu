<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    h1 {
      font-size: 14px;
      margin-bottom: 12px;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-clear {
      background: linear-gradient(135deg, #e53e3e, #c53030);
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #666;
    }
    .success { color: #38a169 !important; }
    .error { color: #e53e3e !important; }
  </style>
</head>
<body>
  <h1>摸鱼助手</h1>
  <button id="syncBtn">同步登录状态</button>
  <button id="clearBtn" class="btn-clear">清除缓存并刷新</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
