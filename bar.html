<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            align-items: center;
            padding: 0 8px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-app-region: drag;
        }
        .nav-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            -webkit-app-region: no-drag;
            flex-shrink: 0;
        }
        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.08);
        }
        .nav-btn:active {
            background: rgba(0, 0, 0, 0.12);
        }
        .nav-btn svg {
            display: block;
        }
        .url-input {
            flex: 1;
            height: 30px;
            margin: 0 6px;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 13px;
            outline: none;
            background: #fff;
            -webkit-app-region: no-drag;
        }
        .url-input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.15);
        }
    </style>
</head>
<body>
    <button class="nav-btn" id="backBtn" title="后退">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
    <button class="nav-btn" id="forwardBtn" title="前进">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
    </button>
    <input type="text" class="url-input" id="urlInput" value="https://bilibili.com" placeholder="输入网址">

    <script>
        const ipcRenderer = window.electronAPI;
        const urlInput = document.getElementById('urlInput');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');

        function loadUrl() {
            const url = urlInput.value;
            ipcRenderer.send('load-url', url);
        }

        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loadUrl();
            }
        });

        urlInput.addEventListener('focus', () => {
            urlInput.select();
        });

        backBtn.addEventListener('click', () => {
            ipcRenderer.send('menu-action', 'backward');
        });

        forwardBtn.addEventListener('click', () => {
            ipcRenderer.send('menu-action', 'forward');
        });

        ipcRenderer.on('update-url', (event, url) => {
            urlInput.value = url;
        });

        ipcRenderer.on('update-bar-bounds', (event, {width}) => {
            document.body.style.width = width + 'px';
        });
    </script>
</body>
</html>
